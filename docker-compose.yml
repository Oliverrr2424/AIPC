services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aipc
      POSTGRES_USER: aipc
      POSTGRES_PASSWORD: aipc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipc -d aipc"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - aipc_postgres:/var/lib/postgresql/data

volumes:
  aipc_postgres:
